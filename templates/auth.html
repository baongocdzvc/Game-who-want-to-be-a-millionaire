<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0D1A">
<title>🎯 Ai Là Triệu Phú — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500;700&family=Bungee&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0D1A;--fg:#fff;--muted:#2D1B4E;
  --accent:#FF3AF2;--cyan:#00F5D4;--yellow:#FFE600;
  --orange:#FF6B35;--purple:#7B2FFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--fg);
  min-height:100vh;overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
/* ── STITCH'S COSMIC BACKGROUND ── */
.stitch-space {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, #101035 0%, #070719 70%, #03030d 100%);
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}
.stitch-space::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(at 0% 0%, rgba(0, 245, 212, 0.15) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(255, 58, 242, 0.15) 0px, transparent 50%),
    radial-gradient(at 80% 20%, rgba(123, 47, 255, 0.12) 0px, transparent 50%);
  opacity: 0.8;
}

.parallax-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  will-change: transform;
}

.stars-layer {
  position: absolute;
  top: -50%; left: -50%; width: 200%; height: 200%;
}

.stars-slow {
  background-image: 
    radial-gradient(circle, #ffffff 1px, transparent 1px),
    radial-gradient(circle, rgba(0, 245, 212, 0.6) 1.2px, transparent 1.2px),
    radial-gradient(circle, rgba(255, 58, 242, 0.5) 1.2px, transparent 1.2px);
  background-size: 140px 140px, 220px 220px, 290px 290px;
  background-position: 0 0, 40px 80px, 130px 30px;
  animation: flySpaceSlow 120s linear infinite;
  opacity: 0.7;
}

.stars-fast {
  background-image: 
    radial-gradient(circle, #ffffff 1.8px, transparent 1.8px),
    radial-gradient(circle, rgba(255, 230, 0, 0.8) 1.5px, transparent 1.5px);
  background-size: 280px 280px, 380px 380px;
  background-position: 80px 140px, 210px 280px;
  animation: flySpaceFast 70s linear infinite;
  opacity: 0.85;
}

/* Flying stars / Shooting stars */
.shooting-stars {
  position: absolute;
  top: -10%; left: -10%;
  width: 120%; height: 120%;
  transform: rotate(-35deg);
}

.shooting-star {
  position: absolute;
  left: 0; top: 0;
  height: 2px;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(0, 245, 212, 1), rgba(255, 58, 242, 1));
  border-radius: 999px;
  filter: drop-shadow(0 0 6px rgba(0, 245, 212, 0.8));
  animation: shoot 10s linear infinite;
  opacity: 0;
}

.shooting-star:nth-child(1) { top: 10%; left: 10%; width: 70px; animation-delay: 0s; animation-duration: 5s; }
.shooting-star:nth-child(2) { top: 25%; left: 50%; width: 100px; animation-delay: 2.2s; animation-duration: 7s; filter: drop-shadow(0 0 6px rgba(255, 58, 242, 0.8)); }
.shooting-star:nth-child(3) { top: 55%; left: 20%; width: 90px; animation-delay: 4.5s; animation-duration: 6s; }
.shooting-star:nth-child(4) { top: 70%; left: 60%; width: 120px; animation-delay: 6.8s; animation-duration: 8s; filter: drop-shadow(0 0 8px rgba(255, 230, 0, 0.8)); }

@keyframes flySpaceSlow {
  from { transform: translate(0, 0); }
  to { transform: translate(-10%, -10%); }
}

@keyframes flySpaceFast {
  from { transform: translate(0, 0); }
  to { transform: translate(-15%, -15%); }
}

@keyframes shoot {
  0% { transform: translateX(0) scale(0); opacity: 0; }
  8% { opacity: 1; transform: translateX(150px) scale(1); }
  18% { opacity: 0; transform: translateX(500px) scale(0.4); }
  100% { opacity: 0; transform: translateX(500px) scale(0); }
}


/* BIG BG WORD */
.bg-mega{
  position:fixed;
  font-family:'Bungee',cursive;
  font-size:clamp(100px,25vw,280px);
  color:rgba(255,230,0,.04);
  top:50%;left:50%;transform:translate(-50%,-50%);
  white-space:nowrap;pointer-events:none;z-index:0;letter-spacing:-8px;
  user-select:none;
}

/* FLOATING DECOS */
.fdeco{position:fixed;pointer-events:none;z-index:1;font-size:clamp(20px,4vw,44px);}
.fdeco:nth-child(1){top:8%;left:4%;color:var(--accent);animation:flt 6s ease-in-out infinite;}
.fdeco:nth-child(2){top:15%;right:6%;color:var(--yellow);animation:flt 5s ease-in-out infinite;animation-delay:.8s;}
.fdeco:nth-child(3){top:55%;left:2%;color:var(--cyan);animation:flt 7s ease-in-out infinite;animation-delay:1.5s;}
.fdeco:nth-child(4){bottom:20%;right:3%;color:var(--purple);animation:flt 5.5s ease-in-out infinite;animation-delay:2s;}
.fdeco:nth-child(5){bottom:12%;left:6%;color:var(--orange);animation:flt 8s ease-in-out infinite;animation-delay:.3s;}
@keyframes flt{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(12deg)}}

/* CARD */
.auth-card{
  position:relative;z-index:2;
  width:100%;max-width:460px;
  padding:20px;
}

/* LOGO */
.logo-area{text-align:center;margin-bottom:28px;position:relative;}
.logo-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(255,230,0,.12) 0%,transparent 70%);
  border-radius:50%;animation:lGlow 3s ease-in-out infinite;pointer-events:none;
}
@keyframes lGlow{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}
.logo-icon{font-size:3.2rem;display:block;animation:iconBounce 2s ease-in-out infinite;margin-bottom:10px;}
@keyframes iconBounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(5deg)}}
.logo-title{
  font-family:'Outfit',sans-serif;font-size:clamp(1.5rem,5vw,2.2rem);
  font-weight:900;text-transform:uppercase;
  background:linear-gradient(90deg,var(--yellow),var(--orange),var(--accent),var(--yellow));
  background-size:250%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 4s ease infinite;
}
@keyframes gradShift{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.logo-sub{font-size:.75rem;color:rgba(255,255,255,.45);letter-spacing:3px;margin-top:6px;text-transform:uppercase;}

/* TABS */
.tabs{
  display:flex;gap:4px;
  background:rgba(255,255,255,.04);
  border:3px solid rgba(255,58,242,.25);
  border-radius:16px;padding:4px;
  margin-bottom:20px;
}
.tab-btn{
  flex:1;padding:11px 8px;
  border:none;background:transparent;color:rgba(255,255,255,.45);
  font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  border-radius:12px;transition:.3s;
}
.tab-btn.active{
  background:linear-gradient(135deg,rgba(255,58,242,.2),rgba(123,47,255,.15));
  color:var(--accent);
  box-shadow:0 0 15px rgba(255,58,242,.15),inset 0 0 0 2px rgba(255,58,242,.3);
}

/* FORM BOX */
.form-box{
  background:linear-gradient(135deg,rgba(45,27,78,.9),rgba(15,52,96,.85));
  border:4px solid var(--yellow);
  border-radius:24px;padding:28px 26px;
  backdrop-filter:blur(16px);
  box-shadow:8px 8px 0 var(--accent),16px 16px 0 rgba(255,58,242,.25),
             0 0 60px rgba(255,230,0,.1);
  position:relative;overflow:hidden;
}
.form-box::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 10%,rgba(255,230,0,.06) 0%,transparent 50%),
              radial-gradient(ellipse at 10% 90%,rgba(255,58,242,.05) 0%,transparent 50%);
  pointer-events:none;
}

.form-panel{display:none;}
.form-panel.active{display:block;animation:panelIn .3s ease;}
@keyframes panelIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

.form-head{
  font-family:'Bungee',cursive;font-size:1rem;
  color:var(--yellow);letter-spacing:3px;margin-bottom:22px;
  display:flex;align-items:center;gap:10px;
  text-shadow:2px 2px 0 var(--accent);
}

/* ALERT */
.alert{
  display:none;padding:11px 14px;border-radius:12px;
  font-size:.88rem;margin-bottom:16px;
  align-items:center;gap:10px;animation:panelIn .3s ease;
}
.alert.show{display:flex;}
.alert.error{background:rgba(255,58,242,.12);border:2px solid rgba(255,58,242,.4);color:#ff8aee;}
.alert.success{background:rgba(0,245,212,.1);border:2px solid rgba(0,245,212,.3);color:var(--cyan);}

/* FORM GROUP */
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.input-wrap{position:relative;}
.input-wrap .ico{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:1rem;color:rgba(255,255,255,.35);
  transition:.3s;pointer-events:none;
}
.fg input{
  width:100%;padding:13px 14px 13px 42px;
  border:3px solid rgba(255,255,255,.1);
  border-radius:12px;
  background:rgba(255,255,255,.05);
  color:#fff;font-size:.95rem;outline:none;
  font-family:'DM Sans',sans-serif;
  transition:.3s;
}
.fg input:focus{border-color:var(--yellow);background:rgba(255,230,0,.05);box-shadow:0 0 20px rgba(255,230,0,.15);}
.fg input:focus~.ico,.input-wrap:focus-within .ico{color:var(--yellow);}
.fg input::placeholder{color:rgba(255,255,255,.2);}

/* STRENGTH BAR */
.sbar{display:none;margin-top:6px;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden;}
.sbar-fill{height:100%;border-radius:2px;transition:.3s;}
.sbar-txt{font-size:.72rem;margin-top:3px;color:rgba(255,255,255,.45);}

/* SUBMIT BTN */
.btn-submit{
  width:100%;padding:15px;
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:900;
  letter-spacing:3px;text-transform:uppercase;
  color:#000;
  background:linear-gradient(135deg,var(--yellow),var(--orange),var(--accent));
  background-size:200%;
  border:none;border-radius:9999px;cursor:pointer;
  transition:all .3s cubic-bezier(.68,-.55,.265,1.55);
  margin-top:6px;position:relative;overflow:hidden;
  box-shadow:4px 4px 0 var(--purple),0 0 30px rgba(255,230,0,.2);
}
.btn-submit:hover{transform:translateY(-3px) scale(1.03);box-shadow:8px 8px 0 var(--purple),0 0 50px rgba(255,230,0,.3);}
.btn-submit:active{transform:scale(.97);box-shadow:2px 2px 0 var(--purple);}
.btn-submit:disabled{opacity:.55;cursor:not-allowed;transform:none;}
.btn-submit::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(transparent,rgba(255,255,255,.15),transparent);
  transform:rotate(45deg);animation:shine 3s ease-in-out infinite;
}
@keyframes shine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}

/* LINKS */
.form-links{
  display:flex;justify-content:space-between;
  margin-top:14px;font-size:.8rem;flex-wrap:wrap;gap:4px;
}
.form-link{color:rgba(255,255,255,.45);cursor:pointer;transition:.2s;}
.form-link:hover{color:var(--cyan);}
.form-link.hl{color:var(--yellow);}
.form-link.hl:hover{color:var(--orange);}
</style>
</head>
<body>

<!-- Stitch's Cosmic Space Background -->
<div class="stitch-space" aria-hidden="true">
  <div class="parallax-layer parallax-slow">
    <div class="stars-layer stars-slow"></div>
  </div>
  <div class="parallax-layer parallax-fast">
    <div class="stars-layer stars-fast"></div>
  </div>
  <div class="shooting-stars">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>
</div>

<div class="bg-mega" aria-hidden="true">TRIỆU PHÚ</div>

<!-- Floating decos -->
<div class="fdeco" aria-hidden="true">✦</div>
<div class="fdeco" aria-hidden="true">★</div>
<div class="fdeco" aria-hidden="true">◆</div>
<div class="fdeco" aria-hidden="true">❋</div>
<div class="fdeco" aria-hidden="true">✦</div>

<div class="auth-card">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-glow" aria-hidden="true"></div>
    <span class="logo-icon" aria-hidden="true">🎯</span>
    <div class="logo-title">AI Là Triệu Phú</div>
    <div class="logo-sub">💎 Who Wants To Be A Millionaire 💎</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">▶ Đăng nhập</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">✦ Đăng ký</button>
  </div>

  <!-- Form box -->
  <div class="form-box">

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-head">🚀 Chào mừng trở lại!</div>
      <div class="alert" id="login-alert"></div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="fg">
          <label for="login-username">Tên đăng nhập</label>
          <div class="input-wrap">
            <input type="text" id="login-username" placeholder="Nhập tên đăng nhập..." autocomplete="username" required>
            <span class="ico" aria-hidden="true">👤</span>
          </div>
        </div>
        <div class="fg">
          <label for="login-password">Mật khẩu</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="Nhập mật khẩu..." autocomplete="current-password" required>
            <span class="ico" aria-hidden="true">🔒</span>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="login-btn">▶ VÀO CHƠI NGAY</button>
      </form>
      <div class="form-links">
        <span class="form-link" onclick="switchTab('forgot')">Quên mật khẩu?</span>
        <span class="form-link hl" onclick="switchTab('register')">Đăng ký ngay →</span>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="form-head">✦ Tạo tài khoản mới</div>
      <div class="alert" id="register-alert"></div>
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="fg">
          <label for="reg-username">Tên đăng nhập</label>
          <div class="input-wrap">
            <input type="text" id="reg-username" placeholder="Ít nhất 3 ký tự..." autocomplete="username" required minlength="3">
            <span class="ico" aria-hidden="true">👤</span>
          </div>
        </div>
        <div class="fg">
          <label for="reg-email">Email</label>
          <div class="input-wrap">
            <input type="email" id="reg-email" placeholder="Email để khôi phục mật khẩu..." autocomplete="email" required>
            <span class="ico" aria-hidden="true">✉️</span>
          </div>
        </div>
        <div class="fg">
          <label for="reg-display">Tên hiển thị</label>
          <div class="input-wrap">
            <input type="text" id="reg-display" placeholder="Tên trong game..." autocomplete="nickname" required>
            <span class="ico" aria-hidden="true">🏷️</span>
          </div>
        </div>
        <div class="fg">
          <label for="reg-password">Mật khẩu</label>
          <div class="input-wrap">
            <input type="password" id="reg-password" placeholder="Ít nhất 6 ký tự..." autocomplete="new-password" required minlength="6" oninput="checkStrength(this.value)">
            <span class="ico" aria-hidden="true">🔒</span>
          </div>
          <div class="sbar" id="strength-bar"><div class="sbar-fill" id="strength-fill"></div></div>
          <div class="sbar-txt" id="strength-text"></div>
        </div>
        <div class="fg">
          <label for="reg-confirm">Xác nhận mật khẩu</label>
          <div class="input-wrap">
            <input type="password" id="reg-confirm" placeholder="Nhập lại mật khẩu..." autocomplete="new-password" required>
            <span class="ico" aria-hidden="true">🔒</span>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="register-btn">🚀 TẠO TÀI KHOẢN</button>
      </form>
      <div class="form-links">
        <span></span>
        <span class="form-link hl" onclick="switchTab('login')">← Đăng nhập</span>
      </div>
    </div>

    <!-- FORGOT -->
    <div class="form-panel" id="panel-forgot">
      <div class="form-head">🔑 Khôi phục mật khẩu</div>
      <div class="alert" id="forgot-alert"></div>

      <form id="forgot-step1" onsubmit="handleRequestCode(event)">
        <p style="font-size:.82rem;color:rgba(255,255,255,.55);margin-bottom:18px;line-height:1.6;">Nhập Email để nhận mã xác nhận 6 số.</p>
        <div class="fg">
          <label for="forgot-email">Email đã đăng ký</label>
          <div class="input-wrap">
            <input type="email" id="forgot-email" placeholder="Nhập email..." required>
            <span class="ico" aria-hidden="true">✉️</span>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="forgot-btn1">✉️ GỬI MÃ XÁC NHẬN</button>
      </form>

      <form id="forgot-step2" onsubmit="handleVerifyAndReset(event)" style="display:none;">
        <p style="font-size:.82rem;color:var(--cyan);margin-bottom:18px;line-height:1.6;">✅ Mã đã được gửi! Kiểm tra email của bạn.</p>
        <div class="fg">
          <label for="forgot-code">Mã xác nhận (6 số)</label>
          <div class="input-wrap">
            <input type="text" id="forgot-code" placeholder="123456" required maxlength="6" pattern="\d{6}">
            <span class="ico" aria-hidden="true">🛡️</span>
          </div>
        </div>
        <div class="fg">
          <label for="forgot-new-pw">Mật khẩu mới</label>
          <div class="input-wrap">
            <input type="password" id="forgot-new-pw" placeholder="Ít nhất 6 ký tự..." required minlength="6">
            <span class="ico" aria-hidden="true">🔒</span>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="forgot-btn2">✔ ĐỔI MẬT KHẨU</button>
      </form>

      <div class="form-links">
        <span></span>
        <span class="form-link hl" onclick="switchTab('login')">← Đăng nhập</span>
      </div>
    </div>

  </div>
</div>

<script>
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));
  if(tab!=='forgot'){
    const tBtn=document.getElementById('tab-'+tab);
    if(tBtn)tBtn.classList.add('active');
  }
  document.getElementById('panel-'+tab).classList.add('active');
  ['login-alert','register-alert','forgot-alert'].forEach(id=>hideAlert(id));
  if(tab==='forgot'){
    document.getElementById('forgot-step1').style.display='block';
    document.getElementById('forgot-step2').style.display='none';
  }
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);
  el.className='alert show '+type;
  el.innerHTML=(type==='error'?'⚠️ ':' ✅ ')+msg;
}
function hideAlert(id){document.getElementById(id).className='alert';}

function checkStrength(pw){
  const bar=document.getElementById('strength-bar');
  const fill=document.getElementById('strength-fill');
  const txt=document.getElementById('strength-text');
  bar.style.display='block';
  let sc=0;
  if(pw.length>=6)sc++;if(pw.length>=10)sc++;
  if(/[A-Z]/.test(pw))sc++;if(/[0-9]/.test(pw))sc++;
  if(/[^A-Za-z0-9]/.test(pw))sc++;
  const lvls=[{w:'20%',c:'#FF3AF2',l:'Rất yếu'},{w:'40%',c:'#FF6B35',l:'Yếu'},{w:'60%',c:'#FFE600',l:'Trung bình'},{w:'80%',c:'#00F5D4',l:'Mạnh'},{w:'100%',c:'#00c853',l:'Rất mạnh 💪'}];
  const l=lvls[Math.min(sc,4)];
  fill.style.width=l.w;fill.style.background=l.c;
  txt.textContent=l.l;txt.style.color=l.c;
}

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('login-btn');
  const username=document.getElementById('login-username').value.trim();
  const password=document.getElementById('login-password').value;
  btn.disabled=true;btn.textContent='⏳ Đang xử lý...';
  hideAlert('login-alert');
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(data.success){showAlert('login-alert','success','Đăng nhập thành công!');setTimeout(()=>window.location.href='/',700);}
    else{showAlert('login-alert','error',data.error||'Đăng nhập thất bại!');btn.disabled=false;btn.textContent='▶ VÀO CHƠI NGAY';}
  }catch(err){showAlert('login-alert','error','Lỗi kết nối server!');btn.disabled=false;btn.textContent='▶ VÀO CHƠI NGAY';}
}

async function handleRegister(e){
  e.preventDefault();
  const btn=document.getElementById('register-btn');
  const username=document.getElementById('reg-username').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const display_name=document.getElementById('reg-display').value.trim();
  const password=document.getElementById('reg-password').value;
  const confirm=document.getElementById('reg-confirm').value;
  if(password!==confirm){showAlert('register-alert','error','Mật khẩu xác nhận không khớp!');return;}
  btn.disabled=true;btn.textContent='⏳ Đang tạo tài khoản...';
  hideAlert('register-alert');
  try{
    const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,display_name,password})});
    const data=await res.json();
    if(data.success){showAlert('register-alert','success','Tạo tài khoản thành công!');setTimeout(()=>window.location.href='/',700);}
    else{showAlert('register-alert','error',data.error||'Đăng ký thất bại!');btn.disabled=false;btn.textContent='🚀 TẠO TÀI KHOẢN';}
  }catch(err){showAlert('register-alert','error','Lỗi kết nối server!');btn.disabled=false;btn.textContent='🚀 TẠO TÀI KHOẢN';}
}

async function handleRequestCode(e){

// Stitch's Parallax scroll effect
window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const slowLayer = document.querySelector('.parallax-slow');
  const fastLayer = document.querySelector('.parallax-fast');
  if (slowLayer) slowLayer.style.transform = `translate3d(0, ${scrolled * -0.06}px, 0)`;
  if (fastLayer) fastLayer.style.transform = `translate3d(0, ${scrolled * -0.15}px, 0)`;
});
</script>
